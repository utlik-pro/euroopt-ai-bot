  # 01.05 — финальный фикс. PR #19 не закрыл вопрос: бот всё ещё описывал
  # «Эта акция относится к сервису "Е-доставка"... сайт e-dostavka.by» вопреки
  # промпту. Причина — canonical не сматчился на «какие сейчас акции по Еврошоку?»,
  # пошёл LLM, и LLM проигнорировал текстовое правило про «не упоминать e-dostavka».
  # Решение: расширить триггеры canonical + понизить min_score 0.85 → 0.75
  # для этой категории, чтобы canonical срабатывал гарантированно.
  # Также убираем все упоминания «Е-доставка»/edostavka.by из ответа.
  - id: edostavka_promo_no_info
    category: external
    min_score: 0.85
    # Защита от false positives: ответ выдаётся ТОЛЬКО если в запросе есть
    # хотя бы одно из этих слов. Без них «какие сейчас акции» / «какие акции»
    # сматчилось бы по общим токенам с триггером «какие акции по еврошоку»
    # (rapidfuzz token_set_ratio даёт высокий балл при подмножестве токенов).
    required_keywords:
      - "еврошок"
      - "evroshok"
      - "едоставк"
      - "е-доставк"
      - "e-dostav"
      - "crash"
      - "lucky"
      - "товары удачи"
      - "краш прайс"
      - "лаки гудс"
    triggers:
      # Прямые упоминания акции (одно слово или короткие фразы)
      - "еврошок"
      - "evroshok"
      - "что такое еврошок"
      - "расскажи про еврошок"
      - "подробности еврошок"
      - "какие товары в еврошоке"
      - "когда заканчивается еврошок"
      - "когда заканчивается текущий еврошок"
      - "сколько длится акция еврошок"
      - "сколько длится еврошок"
      - "когда следующий еврошок"
      - "детали еврошок"
      - "условия еврошок"
      - "есть ли еврошок"
      - "что в еврошоке"
      # Запросы про акции по Еврошоку (типичные формулировки тестировщиков)
      - "акции по еврошоку"
      - "акции еврошок"
      - "какие акции еврошок"
      - "какие акции по еврошоку"
      - "какие сейчас акции по еврошоку"
      - "сейчас акции по еврошоку"
      # Прямые упоминания Е-доставки
      - "акции в едоставке"
      - "акции в е-доставке"
      - "акции едоставки"
      - "акции e-dostavka"
      - "что есть в е-доставке"
      - "скидки в е-доставке"
      - "скидки едоставки"
      # Другие акции Е-доставки
      - "crash price"
      - "краш прайс"
      - "lucky goods"
      - "лаки гудс"
      - "товары удачи"
      # 02.05 — заказчик расширил список Е-доставочных запросов
      - "как долго длится акция еврошок"
      - "сколько длится акция еврошок"
      - "расскажи про еврошок подробнее"
      - "сколько товаров в еврошоке"
      - "какие категории в еврошоке"
      - "есть ли акции в е-доставке"
      - "есть ли акции в едоставке"
      - "акции в е-доставке евроопта"
      - "акции в едоставке евроопта"
    # 02.05 заказчик: «Упоминания Е-доставки в этом контуре нужно убрать
    # ПОЛНОСТЬЮ.» Был ответ с ссылкой e-dostavka.by — теперь нейтральный refusal,
    # без упоминания сервиса, без ссылок, без «отдельный сервис, посмотрите там».
    answer: |
      К сожалению, у меня нет информации по этой акции.

