# Канонические ответы на критичные FAQ-вопросы.
#
# Если запрос пользователя матчится с одним из паттернов ниже (fuzzy ratio >= 0.85),
# бот отдаёт канонический ответ ДОСЛОВНО, минуя LLM. Это гарантирует 100%
# повторяемость на ключевых сценариях из отчётов 21.04 и 24.04.
#
# Структура:
#   - id: уникальный идентификатор
#     triggers: список фраз-якорей; если запрос пользователя похож хотя бы на одну — срабатывает
#     answer: канонический ответ (markdown, multi-line)
#     category: faq | eplus | stores | payment | promotions | delivery | brand
#     min_score: минимальный fuzzy ratio для срабатывания (по умолчанию 0.85)

answers:
  - id: eplus_pay_99_percent
    category: payment
    triggers:
      - "можно ли оплатить бонусами весь чек"
      - "оплатить весь чек бонусами"
      - "сколько процентов бонусами"
      - "оплата бонусами Еплюс"
      - "сколько можно оплатить бонусами"
      - "оплата картой Еплюс"
      - "бонусами оплатить"
      - "сколько процентов от чека бонусами"
    answer: |
      Бонусами «Еплюс» можно оплатить **до 99% стоимости покупки**. Минимальная сумма к оплате деньгами — **2 копейки**.

      1 бонус = 1 копейка. Начисление: 0,5% с чека до 20 руб., 1% с чека от 20 руб. Бонусы не начисляются на алкоголь, табак, сертификаты, лотерейные билеты и SIM-карты.

      Подробнее — в приложении «Еплюс» или на [eplus.by](https://eplus.by/).

  - id: eplus_card_lost
    category: eplus
    triggers:
      - "потерял карту"
      - "утеря карты"
      - "потерял карту Еплюс"
      - "что делать если потерял карту"
      - "карта Еплюс утеряна"
      - "украли карту"
      - "пропала карта"
      - "не могу найти карту"
    answer: |
      При утере карты «Еплюс»:

      1. Выпустите **новую виртуальную карту** в приложении «Еплюс» — это бесплатно и занимает пару минут.
      2. Если нужна пластиковая — её можно купить на кассе любого магазина «Евроопт» за 99 копеек.
      3. Чтобы перенести бонусы со старой карты на новую — заполните **форму обратной связи** на [eplus.by](https://eplus.by/) с указанием обстоятельств.

      Горячая линия: **+375 44 788 88 80**.

  - id: eplus_login
    category: eplus
    triggers:
      - "как войти в личный кабинет"
      - "вход в ЛК"
      - "вход в личный кабинет Еплюс"
      - "забыл пароль"
      - "восстановить пароль"
      - "не могу войти в Еплюс"
      - "как восстановить доступ"
      - "пароль от Еплюс"
    answer: |
      Войти в личный кабинет «Еплюс» можно двумя способами:

      1. **В приложении «Еплюс»** (App Store / Google Play) — по номеру телефона + код из SMS.
      2. **На сайте [eplus.by](https://eplus.by/)** — кнопка «Войти», далее по номеру телефона.

      Если **забыли пароль** — в приложении или на сайте нажмите «Забыли пароль», введите номер телефона, привязанный к карте, и получите код подтверждения по SMS.

  - id: eplus_transfer_bonuses
    category: eplus
    triggers:
      - "перенос бонусов"
      - "перенести бонусы"
      - "как перенести бонусы на другую карту"
      - "объединить бонусы"
      - "перенос бонусов на новую карту"
      - "перенести бонусы Еплюс"
    answer: |
      Перенести бонусы с одной карты «Еплюс» на другую можно через **форму обратной связи** на [eplus.by](https://eplus.by/) — укажите номера обеих карт и причину переноса.

      На кассе или по телефону перенос не выполняется — только через форму. Срок обработки обращения — обычно до нескольких рабочих дней.

      Горячая линия для уточнений: **+375 44 788 88 80**.

