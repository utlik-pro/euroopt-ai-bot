    answer: |
      **Виртуальная карта «Еплюс»** — это карта лояльности в мобильном приложении «Еплюс».

      - **Бесплатна**, без комиссий.
      - Выпускается в приложении за пару минут (App Store / Google Play).
      - Работает так же, как пластиковая: показываете QR-код или штрихкод на кассе, бонусы начисляются и списываются.
      - Не теряется — всегда в телефоне.

      Пластиковая карта стоит 99 копеек на кассе, виртуальная — бесплатна.

