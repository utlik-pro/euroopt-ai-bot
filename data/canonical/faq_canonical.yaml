  - id: bonus_accrual
    category: payment
    triggers:
      - "сколько процентов бонусов начисляется"
      - "сколько начисляется бонусов"
      - "процент начисления бонусов"
      - "начисление бонусов Еплюс"
      - "бонусы Еплюс сколько процентов"
      - "как начисляются бонусы"
    answer: |
      Бонусы «Еплюс» начисляются с каждой покупки:

      - **Чек до 20 руб.** — **0,5%** от стоимости.
      - **Чек от 20 руб.** — **1%** от стоимости.

      Бонусы **не начисляются** на: алкоголь, табак, сертификаты, лотерейные билеты, SIM-карты.

      1 бонус = 1 копейка. Стандартный срок действия — **365 дней** с момента начисления.

  - id: card_price
    category: eplus
    triggers:
      - "сколько стоит карта"
      - "цена карты Еплюс"
      - "стоимость пластиковой карты"
      - "карта Еплюс платная"
      - "карта Еплюс бесплатно"
    answer: |
      Карта «Еплюс»:

      - **Виртуальная карта — бесплатно**, выпускается в приложении «Еплюс».
      - **Пластиковая карта — 99 копеек**, можно купить на кассе любого магазина «Евроопт».

      Обе работают одинаково: бонусы начисляются и списываются по карте на кассе.

  - id: barcode_damaged
    category: eplus
    triggers:
      - "стерся штрихкод"
      - "карта не сканируется"
      - "карта не работает"
      - "штрихкод повреждён"
      - "карта потёрлась"
      - "не считывается карта"
    answer: |
      Если на пластиковой карте **стёрся штрихкод** или она перестала сканироваться:

      1. **Выпустите виртуальную карту** в приложении «Еплюс» — это бесплатно, и бонусы у вас сохранятся (виртуальная карта привязана к вашему аккаунту).
      2. Либо купите новую пластиковую на кассе за 99 копеек и заполните форму обратной связи на [eplus.by](https://eplus.by/) для переноса бонусов.

      Горячая линия: **+375 44 788 88 80**.

  - id: bonus_expiration
    category: payment
    triggers:
      - "срок действия бонусов"
      - "когда сгорают бонусы"
      - "сколько действуют бонусы"
      - "бонусы сгорают"
      - "сколько живут бонусы"
    answer: |
      **Стандартный срок действия бонусов «Еплюс» — 365 дней** с момента начисления.

      Акционные бонусы (полученные по специальным предложениям) могут иметь более короткий срок — он указывается в условиях конкретной акции в приложении «Еплюс».

      Проверить сроки можно в приложении «Еплюс» в разделе бонусов.
