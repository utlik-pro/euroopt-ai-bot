# Канонические ответы на критичные FAQ-вопросы.
#
# Если запрос пользователя матчится с одним из паттернов ниже (fuzzy ratio >= 0.85),
# бот отдаёт канонический ответ ДОСЛОВНО, минуя LLM. Это гарантирует 100%
# повторяемость на ключевых сценариях из отчётов 21.04 и 24.04.
#
# Структура:
#   - id: уникальный идентификатор
#     triggers: список фраз-якорей; если запрос пользователя похож хотя бы на одну — срабатывает
#     answer: канонический ответ (markdown, multi-line)
#     category: faq | eplus | stores | payment | promotions | delivery | brand
#     min_score: минимальный fuzzy ratio для срабатывания (по умолчанию 0.85)

answers:
  - id: eplus_pay_99_percent
    category: payment
    triggers:
      - "можно ли оплатить бонусами весь чек"
      - "оплатить весь чек бонусами"
      - "сколько процентов бонусами"
      - "оплата бонусами Еплюс"
      - "сколько можно оплатить бонусами"
      - "оплата картой Еплюс"
      - "бонусами оплатить"
      - "сколько процентов от чека бонусами"
    answer: |
      Бонусами «Еплюс» можно оплатить **до 99% стоимости покупки**. Минимальная сумма к оплате деньгами — **2 копейки**.

      1 бонус = 1 копейка. Начисление: 0,5% с чека до 20 руб., 1% с чека от 20 руб. Бонусы не начисляются на алкоголь, табак, сертификаты, лотерейные билеты и SIM-карты.

      Подробнее — в приложении «Еплюс» или на [eplus.by](https://eplus.by/).

