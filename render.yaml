services:
- type: worker
  name: euroopt-ai-bot
  env: docker
  plan: standard
  region: frankfurt
  autoDeploy: true
  dockerfilePath: ./Dockerfile
  dockerContext: .
  disk:
    name: euroopt-persist
    mountPath: /app/persist
    sizeGB: 1
  envVars:
  - key: TELEGRAM_BOT_TOKEN
    sync: false
  - key: ATLAS_API_KEY
    sync: false
  - key: ADMIN_USER_IDS
    sync: false
  - key: LLM_PROVIDER
    value: atlas
  - key: LLM_MODEL
    value: openai/gpt-4o-mini
  - key: LLM_TEMPERATURE
    value: '0.3'
  - key: LLM_MAX_TOKENS
    value: '1024'
  - key: LLM_TIMEOUT
    value: '60'
  - key: EMBEDDING_MODEL
    value: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  - key: RAG_SCORE_THRESHOLD
    value: '0.30'
  - key: RAG_TOP_K
    value: '5'
  - key: CHROMA_PERSIST_DIR
    value: /app/data/chroma
  - key: WHITELIST_ENABLED
    value: 'true'
  - key: NON_PRIVATE_IGNORE
    value: 'true'
  - key: RATE_LIMIT_PER_HOUR
    value: '20'
  - key: PRE_APPROVED_USERNAMES
    value: dmitryutlik,yana_martynen,barysm,Netkach
  - key: LOG_LEVEL
    value: INFO
  - key: PYTHONUNBUFFERED
    value: '1'
  - key: TAVILY_API_KEY
    sync: false
  - key: WEB_SEARCH_ENABLED
    value: 'false'
  - key: WEB_SEARCH_DOMAINS
    value: evroopt.by,hitdiscount.by,groshyk.by,igra.evroopt.by,eplus.by,e-dostavka.by
  - key: WEB_SEARCH_CACHE_TTL
    value: '21600'
  - key: WEB_SEARCH_MAX_PER_DAY
    value: '500'
  - key: ENABLE_QUERY_REWRITE
    value: 'true'
  - key: WEB_FALLBACK_MIN_RESULTS
    value: '2'
