services:
- type: worker
  name: euroopt-ai-bot
  env: docker
  plan: standard
  region: frankfurt
  autoDeploy: true
  dockerfilePath: ./Dockerfile
  dockerContext: .
  # Парсинг xlsx-справочника магазинов (1040 точек, 55 автолавок) и переиндексация
  # RAG-базы происходят на этапе docker build (см. Dockerfile).
  # Это гарантирует, что после v2-релиза база уже содержит магазины с разметкой
  # brand/format/city. ChromaDB пишется в /app/chroma_db (ВНЕ persist disk!).
  disk:
    name: euroopt-persist
    mountPath: /app/persist
    sizeGB: 1
  envVars:
  - key: TELEGRAM_BOT_TOKEN
    sync: false
  - key: ATLAS_API_KEY
    sync: false
  - key: ADMIN_USER_IDS
    sync: false
  # Активный LLM-провайдер. Atlas Cloud упал 28.04, переключились на
  # direct OpenAI (Frankfurt без санкций). Если Atlas стабилизируется —
  # можно вернуть atlas + openai/gpt-4o-mini для экономии.
  - key: LLM_PROVIDER
    value: openai
  - key: LLM_MODEL
    value: gpt-4o-mini
  # Идём в OpenAI напрямую без fallback на санкционные провайдеры
  # (Render Frankfurt — несанкционный регион).
  - key: FORCE_DIRECT_LLM
    value: 'true'
  - key: LLM_TEMPERATURE
    value: '0.3'
  - key: LLM_MAX_TOKENS
    value: '1024'
  - key: LLM_TIMEOUT
    value: '60'
  # E5-multilingual — заметно лучше MiniLM на русском, используется в RAGEngine
  # с префиксами query:/passage:. Коллекция в ChromaDB — euroopt_knowledge_v3.
  - key: EMBEDDING_MODEL
    value: intfloat/multilingual-e5-base
  - key: RAG_SCORE_THRESHOLD
    value: '0.30'
  - key: RAG_TOP_K
    value: '5'
  # КРИТИЧНО: /app/data — это смонтированный persist disk в Render.
  # ChromaDB пишется ВНЕ disk (в /app/chroma_db), иначе persist disk
  # перетирает свежесобранную в build коллекцию старой версией.
  - key: CHROMA_PERSIST_DIR
    value: /app/chroma_db
  - key: WHITELIST_ENABLED
    value: 'true'
  - key: NON_PRIVATE_IGNORE
    value: 'true'
  # Поднято на время повторного тестирования заказчиком (30.04 — 05.05).
  # После завершения теста вернуть на 20.
  - key: RATE_LIMIT_PER_HOUR
    value: '1000'
  - key: PRE_APPROVED_USERNAMES
    value: dmitryutlik,yana_martynen,barysm,Netkach
  - key: LOG_LEVEL
    value: INFO
  - key: PYTHONUNBUFFERED
    value: '1'
  - key: TAVILY_API_KEY
    sync: false
  - key: WEB_SEARCH_ENABLED
    value: 'true'
  - key: WEB_SEARCH_DOMAINS
    value: evroopt.by,hitdiscount.by,groshyk.by,igra.evroopt.by,eplus.by,e-dostavka.by
  - key: WEB_SEARCH_CACHE_TTL
    value: '21600'
  # Поднято на время повторного тестирования заказчиком (30.04 — 05.05).
  # После завершения теста вернуть на 500.
  - key: WEB_SEARCH_MAX_PER_DAY
    value: '5000'
  - key: ENABLE_QUERY_REWRITE
    value: 'true'
  - key: WEB_FALLBACK_MIN_RESULTS
    value: '2'
  # Минимальный score top-результата RAG, ниже которого pipeline считает
  # выдачу слабой и идёт в web. Снижено с 0.60 до 0.40 после обновления
  # справочника магазинов 30.04 — короткие карточки дают score ~0.4-0.5,
  # но содержат точные адреса (не нужно идти в web).
  - key: WEB_FALLBACK_MIN_SCORE
    value: '0.40'

  # ========================================================================
  # v2 Quality Improvements — пофазное включение флагов.
  # ФАЗА 1 (включаем СЕЙЧАС, минимум риска, максимум эффекта):
  # ========================================================================
  # 10 канонических FAQ дословно: вход в ЛК, утеря карты, перенос бонусов,
  # «99% / 2 копейки», виртуальная карта, горячая линия и др. Закрывает
  # претензии 21.04 и 24.04 P2. 100% повторяемости на этих сценариях.
  - key: ENABLE_CANONICAL_ANSWERS
    value: 'true'
  # Классификация типа вопроса → правильная temperature: 0.0 для FAQ,
  # 0.5 для рецептов. Закрывает «креатив на FAQ → галлюцинации».
  - key: ENABLE_INTENT_ROUTER
    value: 'true'

  # ========================================================================
  # ФАЗА 2 (LIVE с 28.04.2026 после отчёта тестировщиков):
  # ========================================================================
  # Канонизация запроса: «магазины в Лиде» = «Лида Евроопт магазины».
  # Закрывает 24.04 P2 (повторяемость).
  - key: ENABLE_QUERY_NORMALIZER
    value: 'true'
  # Жёсткое разделение Евроопт / Хит / Грошык в выдаче (требует Фазы 1).
  # Закрывает 24.04 P1 «по Лиде выдал Хит вместо Евроопт».
  - key: ENABLE_BRAND_FILTER
    value: 'true'
  # Реестр 13 механик акций: Еврошок ≠ Спеццены ≠ Еплюс-бонусы ≠ 1+1.
  # Закрывает 24.04 P1 «смешение механик».
  - key: ENABLE_MECHANIC_CONTEXT
    value: 'true'
  # Префикс «🔒 Я не могу обрабатывать ПД» при обнаружении ПД.
  # Закрывает 25.04 §6.4.
  - key: ENABLE_PII_FRAME
    value: 'true'

  # ========================================================================
  # ФАЗА 3 (включается этим коммитом 29.04.2026):
  # ========================================================================
  # Общий кэш «вопрос → ответ» с TTL 1ч. Не per-user (ТЗ §2 о ПД).
  # Закрывает 24.04 P2 (Наташа == Лёша на одинаковых вопросах).
  - key: ENABLE_RESPONSE_CACHE
    value: 'true'
  - key: CACHE_TTL_SECONDS
    value: '3600'
  # Маркер «📋 База / 🌐 Интернет» в рецептах. Закрывает 24.04 P3
  # (прозрачность источника). Требует Фазы 1.
  - key: ENABLE_SOURCE_TAGGER
    value: 'true'
  # Re-ranker для RAG: точнее находит документы (+5–10% lite, +15–20% CE).
  - key: ENABLE_RERANKER
    value: 'true'
  - key: RERANKER_MODE
    value: lite

  # ========================================================================
  # ФАЗА 4 (включается этим коммитом 29.04.2026, log-only):
  # ========================================================================
  # Проверка ответа против источников: ловит выдуманные телефоны/часы/цены.
  # Сначала только лог (auto_fix=false), потом авто-замена через 2-3 дня.
  - key: ENABLE_GROUNDING_VERIFY
    value: 'true'
  - key: GROUNDING_AUTO_FIX
    value: 'false'
