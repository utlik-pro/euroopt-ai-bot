services:
- type: worker
  name: euroopt-ai-bot
  env: docker
  plan: standard
  region: frankfurt
  autoDeploy: true
  dockerfilePath: ./Dockerfile
  dockerContext: .
  disk:
    name: euroopt-data
    mountPath: /app/data
    sizeGB: 1
  envVars:
  - key: TELEGRAM_BOT_TOKEN
    sync: false
  - key: ATLAS_API_KEY
    sync: false
  - key: ADMIN_USER_IDS
    sync: false
  - key: LLM_PROVIDER
    value: atlas
  - key: LLM_MODEL
    value: openai/gpt-4o-mini
  - key: LLM_TEMPERATURE
    value: '0.3'
  - key: LLM_MAX_TOKENS
    value: '1024'
  - key: LLM_TIMEOUT
    value: '60'
  - key: EMBEDDING_MODEL
    value: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  - key: RAG_SCORE_THRESHOLD
    value: '0.30'
  - key: RAG_TOP_K
    value: '5'
  - key: CHROMA_PERSIST_DIR
    value: /app/data/chroma
  - key: WHITELIST_ENABLED
    value: 'true'
  - key: NON_PRIVATE_IGNORE
    value: 'true'
  - key: RATE_LIMIT_PER_HOUR
    value: '20'
  - key: PRE_APPROVED_USERNAMES
    value: dmitryutlik,yana_martynen,barysm
  - key: LOG_LEVEL
    value: INFO
  - key: PYTHONUNBUFFERED
    value: '1'
